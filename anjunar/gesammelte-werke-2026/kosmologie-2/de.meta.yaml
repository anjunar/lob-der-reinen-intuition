bookname: 'Gesammelte Werke 2026'
title: 'Kosmologie 2'
summary: |-
  Die vorliegende Kosmologie stellt eine grundlegende Neubewertung des Verständnisses von
  „Absoluten“ vor. Anstatt das Absolute als eine zeitlose, unveränderliche Entität
  außerhalb der Welt zu konzipieren, argumentiert sie, dass die Welt selbst, insbesondere
  Raum-Zeit, die Grundlage für dieses Konzept bildet. Die Annahme einer vollständigen
  Determiniertheit, die in der Quantenmechanik offenbart wird, wird nicht als Chaos,
  sondern als Offenheit innerhalb einer dynamischen Struktur interpretiert. Raum-Zeit wird
  somit nicht als leere Bühne, sondern als das aktive Kontinuum, in dem Struktur und
  Zufall gleichzeitig wirken. Diese Perspektive impliziert, dass das Absolute nicht als
  Gegenteil von Bewegung, sondern als die Totalität der Bewegung selbst verstanden werden
  muss. Die Persönlichkeit wird als eine temporäre Engstelle innerhalb dieser Offenheit
  betrachtet, die zwar die Notwendigkeit von Handlung und Verantwortung etabliert, aber
  letztlich in das größere Kontinuum eingebettet bleibt. Das Zeitlose verliert seinen
  Status als transzendente Sphäre und wird stattdessen als ein Modus des Erlebens
  innerhalb der Raum-Zeit verstanden. Die daraus resultierende Realität ist nicht kalt,
