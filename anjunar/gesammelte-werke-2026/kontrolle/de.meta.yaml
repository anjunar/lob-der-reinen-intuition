bookname: 'gesammelte-werke-2026'
title: 'Kontrolle'
summary: |-
  Die zentrale Idee des Textes ist, dass Kontrolle keine objektive, unabhängige Macht
  besitzt, sondern eine notwendige, funktionale Fähigkeit des Lebens innerhalb eines
  umfassenden, ungeordneten Geschehens. Die Notwendigkeit der Kontrolle entsteht aus der
  Ich-Perspektive, durch die das Leben sich selbst wahrnimmt, Impulse verarbeitet und
  Handlungen ausrichtet. Diese Kontrolle ist nicht selbständig, sondern wird vom Ich
  verkörpert und manifestiert sich in Orientierung, Entscheidung und Verantwortung. Die
  Gefahr liegt darin, diese relative Kontrolle zu missverstehen und sie als absoluten
  Besitzanspruch zu interpretieren, was zu Leid und Selbstüberhöhung führt. Stattdessen
  erfordert die Aufrechterhaltung einer sinnvollen Kontrolle Durchlässigkeit und die
  Anerkennung, dass das Ich lediglich eine Form innerhalb des größeren Geschehens ist.
  Handeln, Entscheiden und die Übernahme von Konsequenzen erfolgen somit nicht als
  Herrschaft, sondern als verantwortungsvolle Teilhabe an diesem kontinuierlichen,
  kontrollenlosen Fluss des Lebens.
