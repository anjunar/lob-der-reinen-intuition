bookname: 'Gesammelte Werke 2026'
title: 'Liebe ist, was übrig bleibt'
summary: |-
  Die zentrale These des Textes ist, dass Liebe nicht als subjektives Gefühl oder
  moralische Verpflichtung zu verstehen ist, sondern als das fundamentale, unveränderliche
  Ergebnis radikaler Selbstabschneidung. Die Argumentation beginnt mit der Beobachtung,
  dass ständige Anstrengungen – sei es in der Spiritualität oder im Streben nach
  persönlicher Verbesserung – stets von einem „Ich“-Bewusstsein und dem Wunsch nach
  „Erreichen“ geprägt sind. Erst durch die vollständige Abwendung dieser Ziele, die als
  unbefriedigend erweisen, offenbart sich die reine Liebe. Diese Liebe ist nicht aktiv zu
  erzeugen oder zu demonstrieren, sondern sie manifestiert sich spontan in alltäglichen
  Interaktionen wie Blicken, Geduld und Akzeptanz. Sie stellt eine Befreiung von der
  Notwendigkeit der Beweisführung und Selbstdarstellung dar und basiert auf der Fähigkeit,
  ohne Widerstand oder Kampf zu sein. Die Schlussfolgerung ist, dass diese mühelose, von
  Liebe durchdrungene Existenz die eigentliche Befreiung darstellt, nicht als ein
  Zielzustand, sondern als die natürliche Folge einer radikalen Loslösung von
  egozentrischen Ansprüchen.
