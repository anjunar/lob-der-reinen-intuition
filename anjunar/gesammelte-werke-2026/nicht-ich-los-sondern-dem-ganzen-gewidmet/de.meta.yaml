bookname: 'gesammelte-werke-2026'
title: 'Nicht ich-los, sondern dem Ganzen gewidmet'
summary: |-
  Die zentrale Aussage des Textes ist, dass der Begriff „Ich-losigkeit“ eine falsche und
  letztlich hinderliche Interpretation einer bestimmten Lebens- und Handlungsweise
  darstellt. Er argumentiert, dass „Ich-losigkeit“ keineswegs eine Kontrollverlust oder
  eine Auflösung der Handlungsfähigkeit bedeutet. Vielmehr handelt es sich um eine
  Veränderung der Perspektive, bei der die vorhandene Kontrolle nicht aufgegeben, sondern
  neu ausgerichtet wird. Die Entscheidungsfähigkeit, Klarheit und
  Verantwortungsbewusstsein bleiben intakt, können sogar gesteigert werden, da das Handeln
  nicht mehr primär dem persönlichen Vorteil dient, sondern dem Wohl des Ganzen. Die
  bewusste Hingabe, die durch diese Haltung charakterisiert ist, ist keine
  Selbstauflösung, sondern eine aktive und vollkommen verständnisvolle Ausrichtung. Es
  geht darum, die eigene Kontrolle bewusst in den Dienst des größeren Ganzen zu stellen,
  wodurch eine tiefere und erfüllendere Form der Selbstverwirklichung ermöglicht wird.
