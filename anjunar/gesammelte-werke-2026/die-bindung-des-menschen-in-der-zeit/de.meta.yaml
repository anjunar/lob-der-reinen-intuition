bookname: 'gesammelte-werke-2026'
title: 'Die Bindung des Menschen in der Zeit'
summary: |-
  Die zentrale These des Textes ist, dass die menschliche Bindung, insbesondere die
  Notwendigkeit von Gemeinschaft und Ko-Regulation, nicht aus altruistischen oder
  psychologischen Gründen entstanden ist, sondern primär aus biologischer Notwendigkeit,
  die durch die Herausforderungen des Überlebens in frühen menschlichen Gesellschaften
  geprägt wurde. Die Argumentation entwirft eine historische Entwicklung: Von den frühen
  Stammesstrukturen, in denen Isolation den Tod bedeutete, über die mittelalterlichen
  „Schicksalsgemeinschaften“, die durch Leid und Notwendigkeit zusammenhielten, bis hin
  zur Moderne, in der äußere Zwangsläufigkeit abnimmt. Trotz dieser Veränderungen bleibt
  das Nervensystem des Menschen, das auf Synchronisation und gemeinsame Regulation
  ausgelegt ist, bestehen. Dies führt zu Ersatzformen der Bindung, wie Rausch oder
  Polarisierung, wenn keine existenzielle Bedrohung mehr vorhanden ist. Der Text betont,
  dass die heutige Herausforderung darin besteht, eine Bindung freiwillig zu schaffen, die
  auf Sicherheit und Wohlstand basiert und nicht auf Notwendigkeit. Die Entwicklung des
  Leids spielt eine doppelte Rolle: Als Warnsignal und Lernmechanismus, aber auch als
  Quelle von Sinnverlust in der modernen Gesellschaft. Die Spannung
