bookname: 'Poetische Prosa'
title: 'Aus der Ewigkeit gefallen'
summary: |-
  Die zentrale Idee des Textes ist die These, dass der Mensch aus einem Zustand der
  zeitlosen Ewigkeit in die durch die Zeit getrennte Existenz gefallen ist, ähnlich wie
  Adam und Eva aus dem Paradies. Vor dem „Fall“ herrschte ein Zustand des reinen Seins
  ohne Veränderung oder Endlichkeit. Der Beginn der Zeit, symbolisiert durch den Big Bang,
  markiert eine Öffnung dieser Ewigkeit und führt zur Entstehung von Bewusstsein, das mit
  der Trennung von Gut und Böse, Ich und Du, eine spürbare Kluft schafft. Diese Einführung
  der Zeit bringt zwar die Möglichkeit der Erfahrung mit sich, birgt aber auch den Schmerz
  des Verlusts und der Vergänglichkeit. Dennoch ist das Leiden nicht unbegrenzt; es wird
  von der Zeit aufgenommen und schließlich zur Rückkehr zur Ewigkeit führen. Der Mensch
  kehrt nicht in seinen ursprünglichen Zustand zurück, sondern als „Tiefer-Gewordener“
  zurück, wobei das Spiel der Gegensätze schließlich zur Ruhe kommt und die ewige Einheit
  wiederhergestellt wird.
