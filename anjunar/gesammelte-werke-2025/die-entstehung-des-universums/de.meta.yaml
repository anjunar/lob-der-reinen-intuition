bookname: 'Gesammelte Werke 2025'
title: 'Die Entstehung des Universums'
summary: |-
  Die vorliegende Betrachtung stellt eine radikale Neubewertung der Universumsentstehung
  dar, die den Begriff eines Anfangs als irreführend ablehnt. Sie postuliert eine
  gleichzeitige Existenz von Ebenen, in denen das Absolute, als immer gegenwärtiges Feld,
  als Quelle aller Phänomene – von Mechanik bis Bewusstsein – fungiert. Bewusstsein
  entsteht nicht durch Entwicklung, sondern als partielle Selbstberührung dieser Präsenz.
  Die zentrale Idee ist die Vorstellung, dass der Ursprung des Bewusstseins in der
  Möglichkeit des Geistes liegt, als „Keim“ der Person, und Gott wird als erste Erfahrung
  von Innenheit und Tiefe verstanden, als „Schlüpfen“ einer zeitlosen Präsenz. Diese
  Gottesvorstellung wird durch die Menschwerdung Gottes, die Verletzlichkeit und das
  Erleben von Leid betont, als authentische Erfahrung von Innenheit. Leid wird nicht als
  Fehler, sondern als notwendiger Bestandteil der Wirklichkeitserfahrung hervorgehoben. Um
  spirituelle Erkenntnisse zu integrieren, werden praktische Anker wie Präsenz und
  Wahrhaftigkeit als Möglichkeit zur Selbstregulation vorgeschlagen. Der Weg zur Wahrheit
  führt letztlich nicht zu endgültigen Antworten, sondern zu einer stillen Akzeptanz des
  Moments
