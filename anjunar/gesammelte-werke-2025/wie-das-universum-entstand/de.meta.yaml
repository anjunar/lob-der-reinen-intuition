bookname: 'Gesammelte Werke 2025'
title: 'Wie das Universum entstand'
summary: |-
  Die zentrale These des Textes ist, dass das Universum nicht durch einen Schöpferakt
  entstanden ist, sondern durch die Offenheit des absoluten Nichts für die Möglichkeit des
  Bewusstseins. Diese Möglichkeit, die nicht als erlebendes Subjekt existiert, bildet den
  grundlegenden Rahmen für die Entstehung von Raumzeit, Kräften und letztlich der
  komplexen Strukturen des Universums. Die Entwicklung des Lebens, von der mechanischen
  Ordnung bis zur Selbstorganisation, wird als eine Fortsetzung dieser logischen Prozesse
  unter neuen Bedingungen verstanden. Das Aufkommen von Bewusstsein, beginnend mit der
  Fähigkeit zur Innenperspektive, ist dabei kein Zufall, sondern eine notwendige
  Konsequenz dieser strukturellen Grundlage. Die Argumentation baut auf dem Konzept des
  „bedingten Entstehens“ auf, das die Abhängigkeit aller Phänomene von spezifischen
  Bedingungen betont. Das individuelle Bewusstsein, das in komplexen Nervensystemen wie
  dem menschlichen Gehirn entsteht, ist somit eine Realisierung dieser ursprünglichen
  Möglichkeit, nicht aber ein von vornherein geplanter Akt. Die Personalisierung des
  Schöpfers als „Gott“ stellt dem Text zufolge lediglich eine frühe, symbolische
