bookname: 'gesammelte-werke-2025'
title: 'Brahman – das Prinzip der Wiederkehr'
summary: |-
  Die zentrale Idee des Textes ist die Bedeutung von Brahman als das grundlegende Prinzip
  der Wiederkehr im kosmischen Kreislauf des Lebens. Es wird als unendlicher Hintergrund
  dargestellt, der nicht selbst Teil des Kreislaufs ist, sondern ihn trägt und umfasst.
  Die Weisen argumentieren, dass eine bloße Abfolge von Körperveränderungen oder das
  Zerstreuen des Bewusstseins nicht ausreichen, um die Kontinuität des Lebens zu erklären.
  Vielmehr bedarf es eines vollkommen unbegrenzten, ewigen und formlosen Prinzips, das all
  diese Übergänge aufnehmen und wieder freigeben kann, ohne sich dabei selbst zu
  verändern. Brahman ist somit die unsichtbare Grundlage, aus der alle göttlichen
  Erscheinungen entstehen, ein Raum des Bewusstseins, in dem die Götter lediglich Aspekte
  seines Glanzes reflektieren. Die Wiedergeburt ist nur dann sinnvoll, wenn dieses
  Fundament, Brahman, erhalten bleibt, da nur etwas Unbegrenztes die unzähligen Formen
  aufnehmen und wieder freisetzen kann. Die subtilen Überreste der vergangenen Leben
  verweilen im Bewusstseinsfeld Brahmans, als latente Möglichkeiten, die bei Reifung
  wiederkehren
