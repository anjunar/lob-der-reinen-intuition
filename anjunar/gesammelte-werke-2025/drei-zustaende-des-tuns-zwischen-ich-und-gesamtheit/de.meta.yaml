bookname: 'Gesammelte Werke 2025'
title: 'Drei Zustände des Tuns – zwischen Ich und Gesamtheit'
summary: |-
  Die zentrale Idee des Textes ist die Darstellung von drei Zuständen des Handelns, die
  das Verhältnis zwischen dem individuellen Ich und der kosmischen Gesamtheit beleuchten.
  Diese Zustände – „Ich tue, und die Gesamtheit folgt“, „Ich tue, und die Gesamtheit tut
  mit“ und „Ich folge, und die Gesamtheit tut“ – offenbaren, dass Handeln nicht als
  isolierte Unternehmung des Einzelnen verstanden werden kann, sondern als lebendiges
  Zusammenspiel von Individuum und universeller Ordnung. Der erste Zustand beschreibt den
  Willen, der die Welt beeinflusst, während der zweite eine Ko-Kreation darstellt, in der
  das Ich als Instrument in einen größeren Rhythmus eintaucht. Der dritte Zustand
  schließlich betont die Hingabe und das Loslassen, in dem das Ich sich dem Fluss des
  Lebens überlässt. Diese drei Zustände, die in der Philosophie der Bhagavad Gītā, der
  Upanishaden und der Lehren von Ramana Maharshi verwurzelt sind, sind nicht als getrennte
  Pfade zu verstehen, sondern als Ausdrucksformen eines einzigen Prinzips: Brahman. Der
  Text schließt mit der Erkenntnis, dass das Ich als Hüter und Beobachter fungiert,
