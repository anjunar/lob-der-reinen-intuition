bookname: 'Gesammelte Werke 2025'
title: 'Über die Krankheit der Systemimmanenz'
summary: |-
  Die zentrale These des Textes ist, dass die vermeintlichen Probleme der Welt, wie
  Bosheit oder Ungerechtigkeit, nicht von einer inhärenten Übelheit herrühren, sondern von
  der Systemimmanenz entspringen. Diese manifestiert sich in der Selbstgenügsamkeit
  geschlossener Ordnungen – Wirtschaft, Politik, Religion und Wissenschaft – die sich
  durch ihre eigenen Logiken bewegen und nur das akzeptieren, was in ihre vorgegebenen
  Kategorien passt. Dieses ständige Streben nach Ordnung und Kategorisierung führt dazu,
  dass das Leben, das Absolute und das Unbegrenzte, die eigentliche Realität, in Begriffe
  gezwungen und das lebendige in starre Strukturen erstickt wird. Der Mensch, gefangen in
  seinem psychischen System des "Ich" und seiner Identitätsfindung, wird ebenfalls von
  dieser Immanenz betroffen. Die Lösung liegt jedoch in der Bewusstwerdung dieser
  Systemimmanenz, die als Heilung verstanden wird. Durch das Erkennen der eigenen Rolle
  als kleiner Wirbel im unbegrenzten Sein, kann die Macht der Systeme aufgegeben werden.
  Ziel ist nicht die Zerstörung von Systemen, sondern ihre Durchlässigkeit, sodass sie als
  Werkzeuge und nicht als Götzen dienen. Die
