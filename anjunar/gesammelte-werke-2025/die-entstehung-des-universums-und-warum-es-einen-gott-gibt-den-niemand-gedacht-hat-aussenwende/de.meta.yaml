bookname: 'gesammelte-werke-2025'
title: 'Die Entstehung des Universums und warum es einen Gott gibt, den niemand gedacht hat. (Außenwende)'
summary: |-
  Die zentrale These dieser Auseinandersetzung mit der Entstehung des Universums ist, dass
  die Außenwende, eine zeitlose Perspektive auf die Erscheinung, eine alternative Deutung
  der Realität ermöglicht. Anstatt einer linearen Entstehungsgeschichte wird die Präsenz
  als ein immer gegenwärtiges Feld der Möglichkeit postuliert, in dem alle Formen bereits
  liegen. Diese Präsenz ist weder Substanz noch Bewusstsein, sondern die Ermöglichung von
  allem, was erscheint. Die physikalischen Gesetze und die damit verbundene Welt der
  Mechanik werden als Ausdrucksweisen dieser Präsenz verstanden, nicht als frühere Phasen
  des Universums. Ebenso werden Phänomene wie Leben und Bewusstsein nicht als
  Fortschritte, sondern als unterschiedliche Grade der Transparenz der Präsenz
  interpretiert. Die Schlussfolgerung ist, dass der Gottesbegriff in dieser zeitlosen
  Perspektive nicht als ein Schöpfergott, der die Welt aktiv gestaltet, sondern als ein
  Symbol für diese unerschöpfliche Tiefe der Gegenwart dient. Die menschliche Fähigkeit,
  diese Realität zu erfassen, ist kein Beweis für einen planenden Gott, sondern ein
  Hinweis auf die unendliche Tiefe des Jetzt, die jede zeitliche Erklärung
