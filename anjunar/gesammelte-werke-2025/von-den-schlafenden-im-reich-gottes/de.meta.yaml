bookname: 'Gesammelte Werke 2025'
title: 'Von den Schlafenden im Reich Gottes'
summary: |-
  Die zentrale Idee des Textes ist die Vorstellung von Wesenheiten, die jenseits des
  menschlichen Verständnisses im Reich Gottes „schlafen“. Diese translogischen Wesen, wie
  Krishna, Buddha oder Allah, sind keine traditionellen Götter, sondern Ausdruck eines
  lebendigen Grundes allen Seins, der in ewiger Gegenwart existiert. Ihr Schlaf ist keine
  Abwesenheit, sondern eine reine Präsenz, in der sie schöpferisch wirken, ohne die Welt
  direkt zu beeinflussen. Diese Wesen erwachen selten, um im Reich Gottes zu träumen –
  eine schöpferische Erfahrung reiner Formen, aus der das Heilige in die Welt eindringt.
  Sie fungieren als Durchgänge und Boten, doch der wahre Gott bleibt unberührt. Ihre
  Anwesenheit manifestiert sich als Resonanz, eine Berührung, die aus göttlicher Gnade und
  nicht aus Entfernung resultiert. Diese „Schlafenden“ sind außerhalb der Welt wirksam,
  ihre Stille ist eine Fülle ohne Form, die durch ein zartes Gefühl des Unsagbaren
  erfahren werden kann.
