bookname: 'gesammelte-werke-2025'
title: 'Die Einheit und die verschiedenen Ausprägungen'
summary: |-
  Die zentrale These des Textes ist die universelle Natur der Einheit, die in vielfältigen
  spirituellen Traditionen – von christlicher Mystik bis zum Buddhismus – zum Ausdruck
  kommt. Die Argumentation basiert auf der Beobachtung, dass unterschiedliche religiöse
  und mystische Praktiken, wie die Vereinigung mit Gott, Allah oder Parama Brahman,
  letztlich auf die Erfahrung einer fundamentalen, unteilbaren Realität verweisen. Diese
  Erfahrung löst das Streben nach Unterscheidung auf und führt zu einer Auflösung des
  individuellen Ichs. Die verschiedenen Ausprägungen dieser Einheit, wie sie im Sufismus
  (Fana und Baqa), in der Kabbala (die Verschmelzung mit Jehova) oder im Vedanta (Eins mit
  dem formlosen Brahman) dargestellt werden, sind nicht hierarchisch, sondern
  facettenreiche Wege zum selben Ursprung. Der Text betont, dass die Erfahrung des
  Einsseins nicht als ein Ziel zu verstehen ist, sondern als eine Erkenntnis, die das
  Bewusstsein auf seine ursprüngliche, ungeteilte Natur zurückführt. Schließlich wird die
  Frage nach einem „Höheren“ als unzutreffend abgetan, da „Höher“ lediglich eine relative
  Beschreibung einer bereits vorhandenen, stillen und klaren
