bookname: 'Gesammelte Werke 2025'
title: 'Das Erste, das Ewige und die lebendige Welt'
summary: |-
  Die zentrale Idee des Textes ist die Vorstellung eines ursprünglichen, unerschaffenen
  Seins – „Das Erste“ – als Grundlage und Quelle aller Existenz. Dieses Absolute Sein, oft
  als Gott oder Ursprung bezeichnet, ist zeitlos, formlos und wirkt aus seiner eigenen
  Natur, ohne äußeren Willen. Die Schöpfung erfolgte nicht durch einen Anfangsakt, sondern
  durch ein „Erzittern“ des Ursprungs in sich selbst, eine Selbstbeziehung, die den
  universellen Geist und das Bewusstsein hervorbringt. Die Welt entsteht als lebendige
  Erzählung dieses Ursprungs, als Beziehung und Vielheit, in der sich die Einheit erfährt.
  Der physikalische Raum ist dabei eine Ausdehnung des Formlosen, eine Bühne für das
  Erkennen. Die Erfahrung dieses Ursprungs geschieht durch Präsenz im Jetzt, durch Staunen
  und das Einlassen auf die Formlosigkeit im eigenen Herzen. Diese Erfahrung ist weder
  durch Anstrengung noch durch Technologie zugänglich, sondern durch Hinwendung und
  Zuwendung zum gegenwärtigen Moment. Die Welt ist somit nicht zufällig, sondern Ausdruck
  einer ungeteilten Liebe und ein Spiegel, in dem sich das Absolute selbst wiedererkennt –
