bookname: 'Gesammelte Werke 2025'
title: 'Die Entstehung des Universums und warum es einen Gott gibt, den niemand gedacht hat. (Innenwende)'
summary: |-
  Die vorliegende Arbeit stellt eine radikale Inversion der traditionellen
  Betrachtungsweise des Bewusstseins und der Realität vor. Sie argumentiert, dass die
  Entstehung des Universums nicht durch einen externen Schöpfer, sondern durch eine
  allgegenwärtige, innere Ordnung – den Geist – bestimmt wird. Die Innenwende, wie sie
  hier formuliert wird, stellt die Frage nach der inneren Dimension der Wirklichkeit und
  kehrt die Frage nach der Entstehung des Bewusstseins um. Der Geist manifestiert sich
  nicht als subjektives Erleben, sondern als die stabile, kohärente Organisation von
  Wirklichkeit, die in allen Formen, von Pflanzen bis zu anorganischer Materie, präsent
  ist. Diese innere Ordnung, die sich in Gesetzmäßigkeiten und Strukturen offenbart, ist
  nicht als äußere Regelung, sondern als Ausdruck einer tiefen, inneren Konsistenz zu
  verstehen. Die Innenwende schlägt somit vor, dass das Absolute nicht nur als
  Möglichkeitsraum, sondern als die durchgängige Tragfähigkeit dieser inneren Ordnung
  erfahren wird. Die Konsequenz dieser Erkenntnis ist die Neubewertung des Gottesbegriffs,
  der nicht mehr als ein Wesen oder Wille, sondern als die lebendige Erfahrung der
  Durchdring
