bookname: 'gesammelte-werke-2025'
title: 'Die Vorsilbe er- wirkt im Deutschen'
summary: |-
  Die zentrale Idee des Textes ist die tiefgreifende Bedeutung der Vorsilbe „er-“ im
  Deutschen, die weit über ihre grammatikalische Funktion hinausgeht. Sie verkörpert den
  Weg von der inneren Sehnsucht zur Verwirklichung und wird hier als Ausdruck göttlicher
  Präsenz interpretiert. Die Vorsilbe führt uns von der Möglichkeit des Er-Erfahrens, des
  Er-Lebens, des Er-Wünschens und des Er-Lassens zu einer Reihe von göttlichen Handlungen,
  die unser Leben durchdringen. Gott wird als eine aktive Kraft dargestellt, die uns durch
  „Er-holen“, „Er-innern“ und „Er-kennen“ führt, uns trägt, klärt und mit uns baut. Die
  Wiederholung von „Er-Er“ betont dabei nicht eine individuelle Person, sondern den
  Prozess des Werdens und des göttlichen Handelns in jedem Moment. Letztlich offenbart die
  Verwendung der Vorsilbe „er-“ die Möglichkeit einer tiefen, spirituellen Verbundenheit,
  in der das eigene Handeln untrennbar mit dem göttlichen Wirken verbunden ist.
