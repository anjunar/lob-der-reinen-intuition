bookname: 'gesammelte-werke-2025'
title: 'Die zwei Höhen des Selbst – Vom Erwachen zur Integration'
summary: |-
  Die spirituelle Praxis führt oft zu einem Erwachen, das durch die Erkenntnis der
  Illusion des Egos und die Erfahrung des formlosen Bewusstseins gekennzeichnet ist.
  Dieser Prozess, der als „die zwei Höhen des Selbst“ beschrieben wird, beinhaltet
  zunächst eine Distanzierung vom Ego und seinen Mustern, was zu einer tiefen Befreiung in
  der gegenwärtigen Präsenz führt. Allerdings birgt diese erste Phase die Gefahr, das
  Menschliche – Gefühle, Körper und das Ego selbst – als etwas zu betrachten, das man
  loswerden muss. Die zweite Höhe der Integration erfordert stattdessen eine Rückkehr zum
  Leben, bei der das Ego nicht verdrängt, sondern im Licht der Präsenz neu bewertet wird.
  Das Ego verliert seine Macht, wenn es beobachtet wird, und wird zu einem nützlichen
  Werkzeug. So wird die Wunde geheilt und das Menschliche in die Ganzheit integriert. Die
  Verbindung der beiden Höhen – Erwachen ins reine Sein und Rückkehr zum Leben – ist
  entscheidend, um eine vollständige Transformation zu vollziehen. Nur in der Einheit von
  Stille Bewusstheit und lebendiger Erfahrung offenbart sich das wahre Selbst, das nicht
  nur transzendent, sondern auch das Leben durchdringt
