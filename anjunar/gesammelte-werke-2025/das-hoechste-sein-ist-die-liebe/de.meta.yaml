bookname: 'gesammelte-werke-2025'
title: 'Das höchste Sein ist die Liebe'
summary: |-
  Die zentrale These des Textes ist, dass Liebe das höchste Sein darstellt, ein Konzept,
  das durchweg in verschiedenen spirituellen Traditionen – von Brahman im Hinduismus bis
  zum Tao im Chinesischen Denken und der christlichen Vorstellung von Gott – als
  grundlegender Ursprung aller Existenz verstanden wird. Diese Erfahrung der Liebe
  manifestiert sich als eine tiefgreifende Stille, die alles trägt und sich selbst
  hervorbringt, frei von Begrenzungen und persönlichen Anhaftungen. Die Leere, wie sie im
  Zen beschrieben wird, ist nicht leer, sondern voller Potenzial und Möglichkeiten, da sie
  ohne Urteil und Festhalten alles zulässt. Diese Harmonie, in der das Formlose wirkt, ist
  die Schöpferkraft, die das Universum ordnet und heilt, und spiegelt sich in der Selbst-
  Erkenntnis des Bewusstseins wider. Die Suche nach Liebe ist somit eine Illusion, denn
  sie ist die grundlegende Schwingung des Seins, die sich in der Stille offenbart und in
  der die Psyche in einen Raum eintaucht, in dem das höchste Sein – Liebe – sich selbst
  betrachtet.
