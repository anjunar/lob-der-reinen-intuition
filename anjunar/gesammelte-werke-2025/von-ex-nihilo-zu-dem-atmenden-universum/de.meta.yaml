bookname: 'gesammelte-werke-2025'
title: 'Von Ex-Nihilo zu dem Atmenden Universum'
summary: |-
  Die Entwicklung des menschlichen Weltbildes ist geprägt von stabilisierenden
  Bewusstseinsarchitekturen, wobei die Vorstellung von „ex nihilo“ – der Schöpfung aus dem
  Nichts – eine zentrale Rolle spielte. Dieses Konzept, ursprünglich im religiösen Kontext
  entstanden, diente als Fundament für ein lineares Weltverständnis, das Wissenschaft und
  westliche Zivilisation lange Zeit prägte. Es etablierte einen eindeutigen Anfangspunkt,
  einen Zeitpfeil und eine unidirektionale Geschichte, was die menschliche Wahrnehmung
  stabilisierte und die Entwicklung rationaler Wissenschaften ermöglichte. Allerdings
  führte diese starre Perspektive zu einer Vorstellung eines Universums, das unaufhaltsam
  in den „Heat Death“ – einen Zustand der Entropie und Stagnation – abgleitet. Diese
  lineare Sichtweise, die den Menschen als Teil eines mechanischen, einmaligen Prozesses
  sah, schuf eine Atmosphäre der Endgültigkeit und des Sinnverlusts. Die Dominanz des ex-
  nihilo-Denkens verengte die Perspektive und schloss alternative Weltbilder aus, die das
  Universum als atmend, zyklisch und lebendig betrachteten – wie sie in der Vedanta, der
