bookname: 'gesammelte-werke-2025'
title: 'Vier Ebenen des Gottesbildes für das Erwachen des Bewusstseins:'
summary: |-
  Die vorliegende Arbeit skizziert eine hierarchische Entwicklung des Gottesbildes, die
  eng mit dem Erwachen des Bewusstseins verbunden ist. Sie beschreibt vier
  aufeinanderfolgende Ebenen, die eine zunehmende Intimität und Auflösung von Dualitäten
  implizieren. Zunächst manifestiert sich Gott als distanzierter, paternalistischer
  Schöpfer, der die Welt von oben beobachtet und als sicherer Hafen dient. Diese erste
  Ebene, geprägt vom Bild des Kindes, etabliert eine oberflächliche Beziehung. Im weiteren
  Verlauf entwickelt sich eine persönlichere Begegnung mit Gott im Gebet, die eine erste
  innere Verbindung ermöglicht. Die dritte Ebene erweitert das Gottesbild auf die Natur,
  wodurch die Verbundenheit aller Dinge bewusst wird. Abschließend erreicht die höchste
  Stufe die Auflösung jeglicher Trennung, in der Gott nicht mehr als eine externe Entität,
  sondern als das eine Sein verstanden wird, das in allem Ausdruck findet und die Dualität
  in Einheit auflöst. Diese Entwicklung des Gottesbildes spiegelt somit den Prozess des
  Bewusstseins wider, der von einer externen, autoritären Perspektive hin zu einer tiefen,
  allumfassenden Erkenntnis führt.
