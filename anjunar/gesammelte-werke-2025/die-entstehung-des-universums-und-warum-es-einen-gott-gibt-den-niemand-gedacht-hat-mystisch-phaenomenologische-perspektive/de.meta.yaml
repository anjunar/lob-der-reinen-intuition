bookname: 'gesammelte-werke-2025'
title: 'Die Entstehung des Universums und warum es einen Gott gibt, den niemand gedacht hat. (mystisch-phänomenologische Perspektive)'
summary: |-
  Die mystisch-phänomenologische Perspektive stellt eine radikale These über die
  Entstehung des Universums und die Natur Gottes vor. Sie argumentiert, dass das Absolute
  nicht als objektive Realität oder strukturgebendes Prinzip, sondern als ein dynamisches,
  sich zeigendes Ereignis erfahren wird. Dieses Ereignis manifestiert sich nicht durch
  eine Offenbarung von Informationen, sondern durch eine unübersehbarer „Angesprochen-
  Werden“, das die eigene Initiative übersteigt. Diese Erfahrung, geprägt von einer
  phänomenalen Asymmetrie, wird als „Gnade“ verstanden – ein unverdientes, nicht
  kontrollierbares Geschehen, das die Selbstverfügung des Menschen unterbricht. Die
  Perspektive betont die Verwundbarkeit des Menschen, der nicht das Absolute realisiert,
  sondern von ihm berührt wird. Gott wird hier nicht als ein Objekt des Bewusstseins oder
  als eine Struktur der Wirklichkeit konzipiert, sondern als die unaufhebbare Alterität,
  die sich der vollständigen Integration entzieht. Diese Erfahrung verändert das
  Verhältnis von Verantwortung, indem der Mensch nicht als Architekt seiner Gottesnähe,
  sondern als Antwortender verstanden wird. Schuld und Gnade werden als existenzielle
  Zustände definiert,
