bookname: 'Gesammelte Werke 2025'
title: 'Wie man Gott liebt'
summary: |-
  Die Essenz dieses Textes liegt in der Vorstellung, wie wir Gott erfahren können. Er
  argumentiert, dass der traditionelle Begriff eines „Blicks“ – mit der impliziten Annahme
  von Distanz und Beobachtung – für die Gotteserfahrung ungeeignet ist. Gott blickt nicht
  auf die Welt, sondern ist die Welt selbst, ein allumfassendes, durchdringendes Sein.
  Diese Erfahrung manifestiert sich in Momenten der tiefsten Ehrlichkeit, in denen das
  Gefühl der Isolation und des Wahrgenommenwerdens ohne einen beobachtenden Akteur
  entsteht. Die zentrale These ist, dass Gott sich im Menschen als dieses transzendente
  Bewusstsein offenbart, als eine „transparente Bewusstheit“, die das Paradox der Nicht-
  Eigenständigkeit und der Autonomie verkörpert. Dieser Zustand, der oft als „Heimat“
  erlebt wird, ist kein Ort, sondern der Ursprung des Seins. Gott nimmt im Außen die Form
  des Menschen an, der nicht getrennt ist, aber dennoch eine eigene Bewegung besitzt – wie
  eine Welle, die ihren eigenen Schwung hat. Die Erfahrung Gottes ist somit nicht als eine
  externe Erscheinung zu verstehen, sondern als das Aufleuchten des Ursprungs in unserer
