bookname: 'Gesammelte Werke 2025'
title: 'Ebenen der Wahrheit – Ein Schichtenmodell'
summary: |-
  Das Schichtenmodell der Wahrheit beschreibt die Wahrnehmung als eine Reise durch
  aufeinanderfolgende Ebenen, die von einer zentralen, unmittelbaren Erfahrung ausgehen.
  Im Kern, dem Ort reinen Seins und Einheit, existiert Wissen ohne Worte und ohne das
  Konzept eines getrennten Ichs. Um diesen Kern zu erreichen, durchdringt man zunächst
  einen Mantel aus Gefühlen und Emotionen, der als Resonanz des Kerns auftritt und eine
  erste, flüchtige Form des „Ich“ hervorbringt. Anschließend folgt ein dichterer Mantel
  aus Gedanken, Sprache und dem etablierten Ich-Konzept, das mit dem Gefühl des Besitzes
  und der Selbstdefinition einhergeht. Diese Ebenen, obwohl widersprüchlich in ihrer
  Ausprägung, sind Ausdruck derselben fundamentalen Wahrheit. Die Erkenntnis liegt darin,
  dass das zweite Ich, geprägt von Geschichten und Erinnerungen, durchschaut werden kann,
  sobald man die Schichten durchdringt. Der Weg zur Wahrheit besteht somit nicht in der
  Schaffung neuer Inhalte, sondern in der Abwendung von Täuschungen und der vollständigen
  Durchdringung aller Schichten bis zum Wiedererleben der ursprünglichen Einheit und des
  unverfälschten Seins.
