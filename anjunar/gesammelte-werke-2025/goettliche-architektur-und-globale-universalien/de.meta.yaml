bookname: 'Gesammelte Werke 2025'
title: 'Göttliche Architektur und Globale Universalien'
summary: |-
  Die gegenwärtige globale Herausforderungen, wie Klimawandel und soziale Ungleichheit,
  erfordern eine überregionale Antwort, die über die traditionell westlich geprägten
  Leitlinien hinausgehen muss. Ein dialogischer Universalismus, der eine „göttliche
  Architektur“ globaler Ethik formt, bietet hier einen neuen Ansatz. Dieser Ansatz
  vermeidet die Vereinheitlichung von Kulturen und Religionen, sondern fruchtet ihre
  Weisheit. Die Auflösung der westlichen Normenhegemonie ist ein notwendiger Schritt, um
  die Vielfalt der jahrtausendealten Denkweisen in Afrika, Asien und Lateinamerika zu
  berücksichtigen, wie beispielsweise das afrikanische Konzept des Ubuntu. Dieser
  Universalismus fordert eine Neubewertung der philosophischen und spirituellen Einblicke
  aller Zivilisationen und betont die Notwendigkeit, Ideen wie Tianxia in China oder
  Sobornost in Russland aus ihrer eigenen kulturellen Tiefe zu verstehen. Ein solcher
  Austausch erfordert Offenheit und die Bereitschaft, nicht-westliche Konzepte ohne
  Vorurteile zu prüfen. Die Integration dieser Perspektiven ermöglicht eine umfassendere
  Betrachtung globaler Herausforderungen und eröffnet neue Wege für ethische
